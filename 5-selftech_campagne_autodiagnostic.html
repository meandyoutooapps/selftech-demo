function drawQrCode(url) {
  var container = document.getElementById('qr-code');
  if (!container) return;
  container.innerHTML = '';

  // Mini générateur QR local, suffisant pour une maquette réaliste.
  // En production, remplacer par une librairie QR robuste côté front ou back.
  var size = 29;
  var canvas = document.createElement('canvas');
  var px = 6;
  canvas.width = size * px;
  canvas.height = size * px;
  var ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#18375d';

  function hash(str) {
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return h >>> 0;
  }

  function drawFinder(x, y) {
    ctx.fillStyle = '#18375d';
    ctx.fillRect(x * px, y * px, 7 * px, 7 * px);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect((x + 1) * px, (y + 1) * px, 5 * px, 5 * px);
    ctx.fillStyle = '#18375d';
    ctx.fillRect((x + 2) * px, (y + 2) * px, 3 * px, 3 * px);
  }

  drawFinder(0, 0);
  drawFinder(size - 7, 0);
  drawFinder(0, size - 7);

  var seed = hash(url);
  for (var y = 0; y < size; y++) {
    for (var x = 0; x < size; x++) {
      var inFinder = (x < 8 && y < 8) || (x >= size - 8 && y < 8) || (x < 8 && y >= size - 8);
      if (inFinder) continue;

      var v = (seed + x * 374761393 + y * 668265263 + (x*y) * 2246822519) >>> 0;
      var on = ((v ^ (v >> 13)) & 7) < 3;
      if ((x === 6 || y === 6) && !inFinder) on = (x + y) % 2 === 0;
      if (on) {
        ctx.fillStyle = '#18375d';
        ctx.fillRect(x * px, y * px, px, px);
      }
    }
  }

  container.appendChild(canvas);
}

function downloadQrCode() {
  var canvas = document.querySelector('#qr-code canvas');
  if (!canvas) {
    drawQrCode(getUrl());
    canvas = document.querySelector('#qr-code canvas');
  }
  if (!canvas) return;

  var a = document.createElement('a');
  a.download = 'qr-code-autodiagnostic-selftech.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function showTemplate(key, btn) {
  document.querySelectorAll('.comm-tab').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  var t = templates[key] || templates.launch;
  document.getElementById('tpl-title').textContent = t.title;
  document.getElementById('tpl-meta').textContent = t.meta;
  document.getElementById('tpl-body').textContent = t.body.replaceAll('{{URL}}', getUrl());
}

function updateChecklist() {
  var boxes = Array.from(document.querySelectorAll('.check-row input'));
  var checked = boxes.filter(function(b){ return b.checked; }).length;
  var total = boxes.length;
  var pct = Math.round((checked / total) * 100);
  document.getElementById('check-pill').textContent = checked + '/' + total;
  document.getElementById('check-progress').style.width = pct + '%';
  document.getElementById('check-pill').className = 'pill ' + (checked === total ? 'pill-ok' : 'pill-warn');
  document.getElementById('btn-launch').disabled = checked !== total;
}

function formatDateISOToFR(s) {
  if (!s) return '—';
  var parts = String(s).split('-');
  if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
  return s;
}


function parseISODate(s) {
  if (!s || String(s).split('-').length !== 3) return null;
  var p = String(s).split('-');
  return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
}

function diffDays(a, b) {
  if (!a || !b) return null;
  return Math.round((b.getTime() - a.getTime()) / (1000 * 60 * 60 * 24));
}

function updateReminderPlan(launchISO, closeISO) {
  var start = parseISODate(launchISO);
  var end = parseISODate(closeISO);
  var duration = diffDays(start, end);

  var firstDay = 'J+15';
  var lastDay = 'J-10';
  var firstText = 'Relancer à mi-campagne environ, selon la durée choisie.';
  var lastText = 'À prévoir environ 10 jours avant la clôture, ou plus près si la campagne est courte.';

  if (duration !== null && duration > 0) {
    if (duration >= 30) {
      firstDay = 'J+15';
      lastDay = 'J-10';
      firstText = 'Première relance après environ 15 jours de campagne.';
      lastText = 'Dernière relance 10 jours avant la clôture.';
    } else if (duration >= 15) {
      firstDay = 'J+' + Math.max(7, Math.round(duration / 2));
      lastDay = 'J-5';
      firstText = 'Première relance à mi-campagne, car la période est plus courte.';
      lastText = 'Dernière relance 5 jours avant la clôture.';
    } else {
      firstDay = 'J+' + Math.max(3, Math.round(duration / 2));
      lastDay = 'J-2';
      firstText = 'Relance rapide à prévoir, car la campagne est courte.';
      lastText = 'Dernière relance 2 jours avant la clôture.';
    }
  }

  var firstEl = document.getElementById('first-reminder-day');
  var lastEl = document.getElementById('last-reminder-day');
  var firstTextEl = document.getElementById('first-reminder-text');
  var lastTextEl = document.getElementById('last-reminder-text');

  if (firstEl) firstEl.textContent = firstDay;
  if (lastEl) lastEl.textContent = lastDay;
  if (firstTextEl) firstTextEl.textContent = firstText;
  if (lastTextEl) lastTextEl.textContent = lastText;
}

function initFromStorage() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    var stored = raw ? JSON.parse(raw) : {};
    var meta = stored.meta || {};
    var themeTitle = (stored.theme && stored.theme.title) || meta.nom || 'Sécurité & culture de sûreté';
    var slug = meta.slug || 'securite-et-culture-de-surete';
    var url = 'app.selftech.app/sonora-rh/' + slug;

    document.getElementById('sb-title').textContent = themeTitle.replace(/^Autodiagnostic\s+/i, '');
    document.getElementById('launch-url').textContent = url;
    document.getElementById('sb-url').textContent = url;
    drawQrCode(url);

    var launch = meta.date_lancement || meta.dateLancement || '2026-04-30';
    var close = meta.date_cloture || meta.dateCloture || '2026-05-29';

    document.getElementById('kpi-launch').textContent = formatDateISOToFR(launch);
    document.getElementById('kpi-close').textContent = formatDateISOToFR(close);
    document.getElementById('sb-launch').textContent = formatDateISOToFR(launch);
    document.getElementById('sb-close').textContent = formatDateISOToFR(close);
    updateReminderPlan(launch, close);

    if (stored.theme && stored.theme.chapters) {
      var chs = stored.theme.chapters;
      document.getElementById('sb-q').textContent = chs.reduce(function(a,c){ return a + ((c.questions || []).length); }, 0);
      document.getElementById('sb-profils').textContent = chs.reduce(function(a,c){ return a + ((c.profils || []).length); }, 0);
    }
  } catch(e) {
    console.warn('Impossible de charger les données de lancement', e);
  }
  showTemplate('launch', document.querySelector('.comm-tab'));
  drawQrCode(getUrl());
  updateChecklist();
}

function launchCampaign() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    var stored = raw ? JSON.parse(raw) : {};
    stored.launch_ready = true;
    stored.status = 'published';
    localStorage.setItem(LS_KEY, JSON.stringify(stored));
  } catch(e) {}
  alert('Autodiagnostic publié');
  window.location.href = 'selftech_resultats.html';
}

initFromStorage();
</script>
